name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. Splits the
# 30-minute total budget across the 3 targets (~10 min each). The
# cross-decode harnesses dlopen libopenjp2 at runtime via libloading
# and shell out to opj_compress / opj_decompress; the CI runner needs
# `libopenjp2-7-dev` (library + headers) and `libopenjp2-tools` (the
# CLI binaries) so they actually validate instead of silently skipping.

on:
  schedule:
    - cron: "51 5 * * *"   # daily 05:51 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      extra_packages_apt: "libopenjp2-7-dev libopenjp2-tools"
      time_budget_seconds: 1800
    secrets: inherit
