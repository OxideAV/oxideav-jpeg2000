[package]
name = "oxideav-jpeg2000"
version = "0.0.3"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/OxideAV/oxideav-jpeg2000"
authors = ["Mark Karpeles"]
description = "Pure-Rust JPEG 2000 (J2K) codec — Part-1 codestream marker parser; sample decode (DWT + MQ coder + EBCOT) and encoder not yet implemented"

readme = "README.md"
homepage = "https://github.com/OxideAV/oxideav-jpeg2000"
keywords = ["multimedia", "image", "jpeg2000", "jp2", "codec"]
categories = ["multimedia::encoding", "multimedia::images"]

[dependencies]
oxideav-core = "0.0"
oxideav-codec = "0.0"
